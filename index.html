<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AetherForgeV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      width: 100%; height: 100%;
      background: #0b0d10;
      height: 100dvh;
      overscroll-behavior: none;
    }
    #renderCanvas {
      display: block;
      touch-action: none;
      width: 100%;
      height: 100%;
      outline: none;
    }
    #hud {
      position: fixed; left: 8px; top: 8px; color: #cfd6dd;
      font: 12px/1.4 monospace; pointer-events: none; text-shadow: 0 1px 2px #000;
      z-index: 5;
    }
    /* Hotbar is created by inventoryUi.ts with #hotbar id; ensure it stays above canvas. */
    #hotbar { z-index: 10; }
    #crosshair { z-index: 10; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="hud">AetherForgeV alpha — drag to look, WASD to move</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
